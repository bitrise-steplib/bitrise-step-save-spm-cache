format_version: "11"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git

workflows:
  test_spm_default:
    envs:
    - TEST_APP_URL: https://github.com/bitrise-io/sample-apps-ios-swiftpm.git
    - BRANCH: master
    before_run:
    - _setup
    steps:
    - change-workdir:
        title: Switch working dir to _tmp/sample-swiftpm4
        inputs:
        - path: ./_tmp/sample-swiftpm4
    - script:
        title: Clean DerivedData
        inputs:
        - content: rm -rf ~/Library/Developer/Xcode/DerivedData/
    - script:
        title: Resolve dependencies
        inputs:
        - content: |-
            set -ex
            xcodebuild -resolvePackageDependencies
    - path::./:
        title: Execute step
        run_if: "true"
        is_skippable: false
        inputs:
        - verbose: "true"
    - script:
        title: Clean DerivedData
        inputs:
        - content: |-
            rm -rf ~/Library/Developer/Xcode/DerivedData/
    - restore-cache:
        run_if: "true"
        is_skippable: false
        inputs:
        - key: "{{ .OS }}-{{ .Arch }}-spm-cache-"
        - verbose: "true"
    - script:
        title: Resolve dependencies again
        inputs:
        - content: |-
            set -ex
            xcodebuild -resolvePackageDependencies

  test_spm_project_specific_path:
    envs:
    - TEST_APP_URL: https://github.com/bitrise-io/sample-apps-ios-swiftpm.git
    - BITRISE_PROJECT_PATH: sample-swiftpm2.xcodeproj
    - BRANCH: master
    before_run:
    - _setup
    steps:
    - change-workdir:
        title: Switch working dir to _tmp
        inputs:
        - path: ./_tmp/sample-swiftpm4
        - is_create_path: true
    - script:
        title: Clean DerivedData
        inputs:
        - content: rm -rf ~/Library/Developer/Xcode/DerivedData/
    - script:
        title: Resolve dependencies
        inputs:
        - content: |-
            set -ex
            xcodebuild -resolvePackageDependencies
    - path::./:
        title: Execute step
        run_if: "true"
        is_skippable: false
        inputs:
        - derived_data_path:  # empty, so project_path will be used
        - project_path: $BITRISE_PROJECT_PATH
        - verbose: "true"
    - script:
        title: Clean DerivedData
        inputs:
        - content: |-
            rm -rf ~/Library/Developer/Xcode/DerivedData/
    - restore-cache:
        run_if: "true"
        is_skippable: false
        inputs:
        - key: "{{ .OS }}-{{ .Arch }}-spm-cache-"
        - verbose: "true"
    - script:
        title: Resolve dependencies again
        inputs:
        - content: |-
            set -ex
            xcodebuild -resolvePackageDependencies

  test_empty:
    description: |
      Tests the case when there is nothing to compress based on the cache paths. The step returns early in this case
      with a 0 exit code
    steps:
    - change-workdir:
        title: Switch working dir to _tmp
        inputs:
        - path: ./_tmp
        - is_create_path: true
    - script:
        title: Clean DerivedData
        inputs:
        - content: rm -rf ~/Library/Developer/Xcode/DerivedData/
    - path::./:
        title: Execute step
        run_if: "true"
        is_skippable: false
        inputs:
        - verbose: "true"

  _setup:
    steps:
    - script:
        title: Delete _tmp dir
        inputs:
        - content: rm -rf _tmp
    - git::https://github.com/bitrise-steplib/bitrise-step-simple-git-clone.git:
        inputs:
        - repository_url: $TEST_APP_URL
        - clone_into_dir: ./_tmp
        - branch: $BRANCH
